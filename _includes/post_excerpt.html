<article class="border p-2 shadow rounded-xl">
    <h3 class="w-full">
        <a href="{{ post.url }}">
            <div class="flex mb-1">
                <img class="w-full h-60 rounded-md object-cover" src="{{ post.image | relative_url }}"/>
            </div>
            <div class="flex flex-col">
                <div class="font-medium text-gray-700 decoration-gray-300 hover:decoration-gray-500 dark:text-white dark:decoration-gray-400 dark:hover:decoration-gray-300">{{ post.title | escape }}</div>
                <div class="text-sm text-gray-500 dark:text-gray-300">
                    <span>{{ post.date | date: "%B %d, %Y" }} • By {{ site.authors[post.author].name }}</span>
                </div>
            </div>
        </a>
    </h3>
</article>
